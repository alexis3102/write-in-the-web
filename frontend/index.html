<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>write</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="fondo">
        <img src="img/register.png" id="login">
    </section>

    <section id="login">
        <div id="elementos-register">
            <img src="img/perfil.png" id="img-perfil">
            <h1 id="title-register">REGISTER</h1>
            <div id="caja-semitrasparente">
                <div id="formulario">
                    <div id="name">
                        <p id="name">
                            <label for="">NAME</label>
                            <input type="text">
                        </p>
                        <img src="img/name.png" id="img-name">
                    </div>
                    
                    <div id="password">
                        <p id="password">
                            <label for="">PASSWORD</label>
                            <input type="text">
                        </p>
                        <img src="img/password.png" id="img-password">
                    </div>

                    <div id="email">
                        <p id="email">
                            <label for="">EMAIL</label>
                            <input type="text">
                        </p>
                        <img src="img/email.png" id="img-email" >
                    </div>

                </div>
            </div>
            
        </div>
        
    </section>
</body>
</html>
