<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section id="fondo">
        <img src="img/register.png" id="bg-image">
    </section>

    <section id="login">
        <div id="elementos-register">
            <img src="img/perfil.png" id="img-perfil">
            <h1 id="title-register">REGISTER</h1>

            <div id="caja-semitrasparente">
                
                <!-- 🔥 FORM CORRECTO -->
                <form action="http://127.0.0.1:8000/user/" method="POST">

                    <div class="campo">
                        <label>NAME</label>
                        <input type="text" name="NAME" placeholder="Usuario" required>
                        <img src="img/name.png" class="icono">
                    </div>
                    
                    <div class="campo">
                        <label>PASSWORD</label>
                        <input type="password" name="PASSWORD" placeholder="Contraseña" required>
                        <img src="img/password.png" class="icono">
                    </div>

                    <div class="campo">
                        <label>EMAIL</label>
                        <input type="email" name="MAIL" placeholder="Correo" required>
                        <img src="img/email.png" class="icono">
                    </div>

                    <button type="submit">Registrarse</button>

                </form>
                <!-- 🔥 FIN FORM -->

            </div>
        </div>
    </section>

</body>
</html>
