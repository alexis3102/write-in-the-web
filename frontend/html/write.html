<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escritorio — API Manager</title>
  <link rel="stylesheet" href="../css/write.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Noise overlay -->
  <div class="noise"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">✦</span>
      <div>
        <p class="brand-name">Escritorio</p>
        <p class="brand-sub">API Manager</p>
      </div>
    </div>

    <nav class="nav">
      <p class="nav-label">Textos</p>
      <button class="nav-btn active" data-panel="write-text">
        <span class="nav-icon">✍</span> Crear texto
      </button>
      <button class="nav-btn" data-panel="search-text">
        <span class="nav-icon">⌕</span> Buscar texto
      </button>

      <p class="nav-label">Personajes</p>
      <button class="nav-btn" data-panel="create-char">
        <span class="nav-icon">◈</span> Crear personaje
      </button>
      <button class="nav-btn" data-panel="search-char">
        <span class="nav-icon">⌕</span> Buscar personaje
      </button>
      <button class="nav-btn" data-panel="update-char">
        <span class="nav-icon">⟳</span> Actualizar personaje
      </button>
      <button class="nav-btn" data-panel="delete-char">
        <span class="nav-icon">⌫</span> Eliminar personaje
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Listo</span>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Header -->
    <header class="topbar">
      <h1 class="topbar-title" id="panel-title">Crear texto</h1>
      <div class="topbar-meta">
        <span id="endpoint-badge" class="badge">POST /write/</span>
      </div>
    </header>

    <!-- Panel: Crear texto -->
    <section class="panel active" id="panel-write-text">
      <div class="form-grid">
        <div class="field">
          <label>Título</label>
          <input type="text" id="wt-title" placeholder="El nombre de tu obra…" />
        </div>
        <div class="field full">
          <label>Texto</label>
          <textarea id="wt-text" rows="10" placeholder="Escribe aquí tu historia, poema, relato…"></textarea>
        </div>
        <div class="field full">
          <button class="btn-primary" onclick="createText()">
            <span>Publicar</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Panel: Buscar texto -->
    <section class="panel" id="panel-search-text">
      <div class="form-grid">
        <div class="field">
          <label>Título</label>
          <input type="text" id="st-title" placeholder="Nombre exacto del texto…" />
        </div>
        <div class="field">
          <button class="btn-primary" onclick="searchText()">
            <span>Buscar</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Panel: Crear personaje -->
    <section class="panel" id="panel-create-char">
      <div class="form-grid">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="cc-name" placeholder="Ej: Valentina Ríos" />
        </div>
        <div class="field">
          <label>Edad</label>
          <input type="number" id="cc-age" placeholder="Ej: 32" />
        </div>
        <div class="field full">
          <label>Personalidad</label>
          <input type="text" id="cc-personaly" placeholder="Describe su carácter y rasgos…" />
        </div>
        <div class="field full">
          <label>Historia</label>
          <textarea id="cc-history" rows="6" placeholder="El pasado, motivaciones y contexto del personaje…"></textarea>
        </div>
        <div class="field full">
          <button class="btn-primary" onclick="createChar()">
            <span>Crear personaje</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Panel: Buscar personaje -->
    <section class="panel" id="panel-search-char">
      <div class="form-grid">
        <div class="field">
          <label>Nombre del personaje</label>
          <input type="text" id="sc-name" placeholder="Nombre exacto…" />
        </div>
        <div class="field">
          <button class="btn-primary" onclick="searchChar()">
            <span>Buscar</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Panel: Actualizar personaje -->
    <section class="panel" id="panel-update-char">
      <div class="form-grid">
        <div class="field full">
          <label>Nombre actual <span class="required">*requerido</span></label>
          <input type="text" id="uc-name" placeholder="Nombre actual del personaje…" />
        </div>
        <div class="divider-label">Nuevos valores (dejar vacío para no cambiar)</div>
        <div class="field">
          <label>Nuevo nombre</label>
          <input type="text" id="uc-new-name" placeholder="—" />
        </div>
        <div class="field">
          <label>Nueva edad</label>
          <input type="number" id="uc-new-age" placeholder="—" />
        </div>
        <div class="field full">
          <label>Nueva personalidad</label>
          <input type="text" id="uc-new-personaly" placeholder="—" />
        </div>
        <div class="field full">
          <label>Nueva historia</label>
          <textarea id="uc-new-history" rows="5" placeholder="—"></textarea>
        </div>
        <div class="field full">
          <button class="btn-primary" onclick="updateChar()">
            <span>Guardar cambios</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Panel: Eliminar personaje -->
    <section class="panel" id="panel-delete-char">
      <div class="form-grid">
        <div class="field">
          <label>Nombre del personaje</label>
          <input type="text" id="dc-name" placeholder="Nombre exacto a eliminar…" />
        </div>
        <div class="field">
          <button class="btn-danger" onclick="deleteChar()">
            <span>Eliminar</span> <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Response area -->
    <div class="response-container" id="response-box" style="display:none;">
      <div class="response-header">
        <span class="response-label">Respuesta</span>
        <button class="response-close" onclick="closeResponse()">✕</button>
      </div>
      <pre class="response-body" id="response-body"></pre>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </main>

  <script src="../js/write.js"></script>
</body>
</html>
