<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone of Write</title>
    <link rel="stylesheet" href="../css/write.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <main class="write-container">
        <header>
            <h1>your history</h1>
            <button id="toggle-panel-btn" class="icon-btn" title="Abrir Chaterest">
                <span class="material-symbols-outlined">group</span>
            </button>
        </header>

        <form id="write-form">
            <input type="text" id="write-title" placeholder="Título de tu historia..." required>
            <textarea id="write-text" placeholder="Comienza a escribir aquí..." required></textarea>
            <div class="form-actions">
                <button type="submit" class="primary-btn">Guardar Escrito</button>
            </div>
        </form>
    </main>

    <aside id="chaterest-panel" class="side-panel">
        <div class="panel-header">
            <h2>Chaterest</h2>
            <button id="close-panel-btn" class="icon-btn" title="Cerrar">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <form id="chaterest-form">
            <div class="input-group">
                <label for="char-name">Nombre</label>
                <input type="text" id="char-name" placeholder="Ej. Elara" required>
            </div>
            
            <div class="input-group">
                <label for="char-age">Edad</label>
                <input type="number" id="char-age" placeholder="Ej. 24" required>
            </div>
            
            <div class="input-group">
                <label for="char-personality">Personalidad</label>
                <input type="text" id="char-personality" placeholder="Ej. Calculadora, leal" required>
            </div>
            
            <div class="input-group">
                <label for="char-history">Historia</label>
                <textarea id="char-history" placeholder="Pasado del personaje..." rows="5" required></textarea>
            </div>

            <button type="submit" class="secondary-btn">Crear Personaje</button>
        </form>
    </aside>

    <script src="../js/write.js"></script>
</body>
</html>
