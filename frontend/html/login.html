<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <section id="fondo">
        <img src="../img/login fondo.png" id="bg-image">
    </section>

    <section id="login">
        <div id="elementos-register">
            <img src="../img/perfil.png" id="img-perfil">
            <h1 id="title-register">LOGIN</h1>

            <div id="caja-semitrasparente">

                <form id="login-form">

                    <div class="campo">
                        <img src="../img/perfil.png" class="icono" alt="User Icon">
                        <input type="text" name="username" placeholder="NAME" required>
                    </div>

                    <div class="campo">
                        <img src="../img/password.png" class="icono" alt="Lock Icon">
                        <input type="password" name="password" placeholder="PASSWORD" required>
                    </div>

                    <button type="submit">SIGN IN</button>

                    <div class="social-icons">
                        <img src="../img/facebook.png" alt="Facebook">
                        <img src="../img/chrome.png" alt="Chrome">
                    </div>

                    <p id="register-link">Don't have an account? <a href="../register.html">Register</a></p>

                </form>

            </div>
        </div>
    </section>

    <script>
        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            const data = {
                NAME: formData.get("username"),
                PASSWORD: formData.get("password")
            };

            try {
                const response = await fetch("http://127.0.0.1:8000/login/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                console.log(result);

                if (result.status === "success") {
                    window.location.href = "write.html";

                } else {
                    alert("Error: " + result.message + " ❌");
                }

            } catch (error) {
                console.error(error);
                alert("Error de conexión ❌");
            }
        });
    </script>

    <style>
        /* Estilos extra específicos del login */
        #register-link {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        #register-link a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 1px;
            transition: border-color 0.3s ease;
        }

        #register-link a:hover {
            border-color: white;
        }

        #login-form button[type="submit"] {
        width: 100%;
        }
    </style>

</body>

</html>
